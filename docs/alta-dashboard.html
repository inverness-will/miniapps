<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alta Dashboard</title>
    <link rel="stylesheet" href="css/style.css?v=10" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1 id="dashboard-title">Alta Dashboard</h1>
            <p class="tagline">Useful information from Alta Video API</p>
          </div>
        </div>
      </header>

      <main class="layout layout-single">
        <section class="col">
          <div class="card">
            <div class="card-head card-head-split">
              <div>
                <h2>Summary</h2>
                <p class="card-sub">Live overview from your Alta tenant.</p>
              </div>
              <div class="ai-alerts-actions">
                <a class="btn btn-ghost" href="index.html">Home</a>
                <button type="button" class="btn btn-primary" id="dashboardRefreshBtn">Refresh</button>
              </div>
            </div>
            <div id="dashboardStatus" class="inline-status" aria-live="polite"></div>
            <div class="warning-snapshots-grid" id="dashboardSummaryGrid"></div>
          </div>
        </section>

        <section class="col">
          <div class="card card-tall">
            <div class="card-head">
              <h2>Devices</h2>
            </div>
            <ul id="dashboardDevices" class="ai-alerts-list"></ul>
          </div>
        </section>

        <section class="col">
          <div class="card card-tall">
            <div class="card-head">
              <h2>Watchlists</h2>
            </div>
            <ul id="dashboardWatchlists" class="ai-alerts-list"></ul>
          </div>
        </section>

        <section class="col">
          <div class="card">
            <div class="card-head">
              <h2>Errors</h2>
            </div>
            <ul id="dashboardErrors" class="ai-alerts-list"></ul>
          </div>
        </section>
      </main>
    </div>
    <script src="js/alta-dashboard.js?v=1"></script>
  </body>
</html>
