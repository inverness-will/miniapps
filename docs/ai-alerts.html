<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Alerts</title>
    <link rel="stylesheet" href="css/style.css?v=10" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1 id="ai-alerts-title">AI Alerts</h1>
            <p class="tagline">Create and manage AI-triggered alerts</p>
          </div>
        </div>
      </header>

      <main class="layout layout-single">
        <section class="col" aria-labelledby="ai-alerts-title">
          <div class="card card-tall">
            <div class="card-head card-head-split">
              <div>
                <h2>Configured alerts</h2>
                <p class="card-sub">Alert prompt text is stored but not shown in this list.</p>
              </div>
              <div class="ai-alerts-actions">
                <a class="btn btn-ghost" href="index.html">Home</a>
                <button type="button" class="btn btn-primary ai-add-btn" id="addAlertBtn" aria-label="Create alert">+</button>
              </div>
            </div>
            <ul id="alertsList" class="ai-alerts-list"></ul>
            <p id="alertsStatus" class="list-foot" aria-live="polite"></p>
          </div>
        </section>
        <section class="col" aria-labelledby="responsesTitle">
          <div class="card card-tall">
            <div class="card-head card-head-split">
              <div>
                <h2 id="responsesTitle">Webhook AI responses</h2>
                <p class="card-sub">Recent webhook responses with snapshot thumbnails and AI output.</p>
              </div>
              <button type="button" class="btn btn-ghost" id="clearResponsesBtn">Clear responses</button>
            </div>
            <ul id="responsesList" class="ai-response-list"></ul>
            <p id="responsesStatus" class="list-foot" aria-live="polite"></p>
          </div>
        </section>
      </main>
    </div>

    <div class="ai-alerts-modal is-hidden" id="alertModal" role="dialog" aria-modal="true" aria-labelledby="alertModalTitle" hidden>
      <div class="ai-alerts-modal-card">
        <div class="card-head card-head-split">
          <h2 id="alertModalTitle">Create AI alert</h2>
          <button type="button" class="btn btn-ghost" id="closeAlertModalBtn">Close</button>
        </div>
        <label class="field">
          <span>Alert name</span>
          <input type="text" id="alertNameInput" maxlength="120" placeholder="e.g. Loitering in ambulance bay" />
        </label>
        <label class="field">
          <span>Prompt</span>
          <textarea id="alertPromptInput" class="ai-alerts-textarea" rows="6" placeholder="Describe what the AI should detect..."></textarea>
        </label>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="saveAlertBtn">Save alert</button>
        </div>
        <p id="alertFormStatus" class="inline-status" aria-live="polite"></p>
      </div>
    </div>
    <script src="js/ai-alerts.js?v=2"></script>
  </body>
</html>
