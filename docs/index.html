<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Security Operations Hub</title>
    <link rel="stylesheet" href="css/style.css?v=10" />
  </head>
  <body class="home-body">
    <main class="home-shell">
      <section class="home-card" aria-labelledby="home-title">
        <div class="home-settings-wrap">
          <button type="button" class="btn btn-ghost home-settings-btn" id="homeSettingsBtn" aria-label="App visibility settings">
            ⚙
          </button>
        </div>
        <div class="brand home-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1 id="home-title">Security Operations</h1>
            <p class="tagline">Choose a workflow</p>
          </div>
        </div>
        <div class="home-actions" id="homeActions">
          <a class="home-link-btn" data-app-id="patient-elopement" href="patient-elopement.html">Patient elopement</a>
          <a class="home-link-btn" data-app-id="ai-alerts" href="ai-alerts.html">AI alerts</a>
          <a class="home-link-btn" data-app-id="alta-dashboard" href="alta-dashboard.html">Alta dashboard</a>
          <a class="home-link-btn" data-app-id="car-timing" href="car-timing.html">Car timing</a>
          <a class="home-link-btn" data-app-id="advanced-heatmaps" href="advanced-heatmaps.html">Advanced heatmaps</a>
          <a class="home-link-btn" data-app-id="tailgating" href="tailgating.html">Tailgating</a>
        </div>
      </section>
    </main>
    <div class="ai-alerts-modal is-hidden" id="homeSettingsModal" role="dialog" aria-modal="true" aria-labelledby="homeSettingsTitle" hidden>
      <div class="ai-alerts-modal-card">
        <div class="card-head card-head-split">
          <h2 id="homeSettingsTitle">Visible mini apps</h2>
          <button type="button" class="btn btn-ghost" id="homeSettingsCloseBtn">Close</button>
        </div>
        <div id="homeSettingsList" class="home-settings-list"></div>
      </div>
    </div>
    <script src="js/home.js?v=2"></script>
  </body>
</html>
